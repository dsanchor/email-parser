<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Email Parser{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="nav__inner">
      <a href="/emails" class="nav__brand" aria-label="Email Parser Home">
        <svg class="nav__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="3"/>
          <polyline points="22,7 12,14 2,7"/>
        </svg>
        <span>Email Parser</span>
      </a>
      <ul class="nav__links">
        <li>
          <a href="/emails">
            <svg class="nav__link-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="22,12 16,12 14,15 10,15 8,12 2,12"/>
              <path d="M5.45,5.11 2,12 2,18 C2,19.1 2.9,20 4,20 L20,20 C21.1,20 22,19.1 22,18 L22,12 18.55,5.11 C18.22,4.45 17.55,4 16.82,4 L7.18,4 C6.45,4 5.78,4.45 5.45,5.11Z"/>
            </svg>
            Inbox
          </a>
        </li>
      </ul>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__content">
        <span class="footer__brand">Email Parser</span>
        <span class="footer__sep" aria-hidden="true"></span>
        <span>Powered by Azure</span>
      </div>
    </div>
  </footer>
</body>
</html>
